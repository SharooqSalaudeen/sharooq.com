[build]
  command = "npm run export"
  publish = "out"
  functions = "functions"

[build.environment]
  NODE_VERSION = "18"
  JAMIFY_NEXT_ISR = "false"
  JAMIFY_NEXT_FEATURE_IMAGES = "false"
  JAMIFY_NEXT_INLINE_IMAGES = "false"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"


[[redirects]]
  from = "/solved"
  to = "/solved-argument-of-type-x-is-not-assignable-to-parameter-of-type-never"
  status = 301
  force = true